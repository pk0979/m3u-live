- name: Auto Update M3U
  run: |
    echo "#EXTM3U" > all.m3u

    SOURCES=(
      "http://pk79.wuaze.com/upload/colatv.m3u"
      "http://pk79.wuaze.com/upload/2qlive.m3u"
    )

    for url in "${SOURCES[@]}"; do
      echo "Downloading $url"

      curl -L -A "Mozilla/5.0" --max-time 30 "$url" -o temp.m3u

      # Kiểm tra nếu file chứa HTML thì bỏ qua
      if grep -qi "<html" temp.m3u; then
        echo "⚠ $url trả về HTML - bỏ qua"
        continue
      fi

      # Kiểm tra nếu không có #EXTINF thì bỏ
      if ! grep -q "#EXTINF" temp.m3u; then
        echo "⚠ $url không phải M3U hợp lệ - bỏ qua"
        continue
      fi

      sed '/#EXTM3U/d' temp.m3u >> all.m3u
    done

    rm -f temp.m3u
